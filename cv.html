<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV — Wenni Yang</title>
  <meta name="description" content="Curriculum vitae of Wenni Yang, PhD candidate in Economics at UC Davis." />
  <link rel="canonical" href="https://wenniyang.com/cv.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lora', Georgia, serif;
      color: #333;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.55rem;
      font-weight: 700;
      text-decoration: none;
      color: #457b9d;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    nav a {
      text-decoration: none;
      color: #444;
      font-size: 0.95rem;
      font-family: 'Lora', Georgia, serif;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    nav a:hover {
      background: #f0f0f0;
    }

    nav a.active {
      font-weight: 600;
      color: #111;
    }

    /* CV viewer */
    main {
      padding: 24px 40px;
    }

    .cv-heading {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 3.6rem;
      font-weight: 500;
      color: #457b9d;
      margin-bottom: 16px;
      text-align: center;
    }

    .cv-frame {
      display: block;
      width: 100%;
      height: 85vh;
      min-height: 600px;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
    }

    .cv-fallback {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #444;
    }

    .cv-fallback a {
      color: #0070f3;
      text-decoration: none;
    }

    .cv-fallback a:hover {
      text-decoration: underline;
    }

    /* Mobile: embedded PDFs don't render/scroll in an iframe on phones,
       so show a tap-to-open button instead. Hidden on desktop. */
    .cv-mobile {
      display: none;
    }

    @media (max-width: 768px) {
      header {
        padding: 14px 20px;
      }

      main {
        padding: 16px 20px;
      }

      /* iframe PDF embedding is broken on mobile — hide it, show the button */
      .cv-frame,
      .cv-fallback {
        display: none;
      }

      .cv-mobile {
        display: block;
        text-align: center;
        margin-top: 8px;
      }

      .cv-mobile-note {
        font-size: 0.95rem;
        color: #555;
        margin-bottom: 16px;
      }

      .cv-open {
        display: inline-block;
        background: #457b9d;
        color: #fff;
        text-decoration: none;
        font-family: 'Lora', Georgia, serif;
        font-size: 1.05rem;
        padding: 14px 28px;
        border-radius: 12px;
      }

      .cv-open:active {
        background: #3a6a87;
      }
    }

    @media (max-width: 480px) {
      .site-name {
        font-size: 1.1rem;
      }

      nav a {
        padding: 6px 8px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <a class="site-name" href="index.html">Wenni Yang</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="research.html">Research</a>
      <a href="cv.html" class="active">CV</a>
    </nav>
  </header>

  <main>
    <h1 class="cv-heading">CV</h1>
    <iframe class="cv-frame" src="CV_Wenni_Yang.pdf" title="CV — Wenni Yang">
    </iframe>
    <p class="cv-fallback">
      If the CV doesn't display above,
      <a href="CV_Wenni_Yang.pdf" target="_blank" rel="noopener">open it in a new tab</a>.
    </p>
    <div class="cv-mobile">
      <p class="cv-mobile-note">Tap below to view the CV in your device's PDF viewer.</p>
      <a class="cv-open" href="CV_Wenni_Yang.pdf" target="_blank" rel="noopener">View CV (PDF)</a>
    </div>
  </main>

</body>
</html>
