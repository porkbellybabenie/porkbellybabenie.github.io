<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wenni Yang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lora', Georgia, serif;
      color: #333;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.55rem;
      font-weight: 700;
      text-decoration: none;
      color: #457b9d;
    }

    .page-heading {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 3.6rem;
      font-weight: 500;
      color: #457b9d;
      text-align: center;
      margin-bottom: 48px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    nav a {
      text-decoration: none;
      color: #444;
      font-size: 0.95rem;
      font-family: 'Lora', Georgia, serif;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    nav a:hover {
      background: #f0f0f0;
    }

    nav a.active {
      font-weight: 600;
      color: #111;
    }

    /* Profile section */
    main {
      max-width: 1100px;
      margin: 70px auto;
      padding: 0 40px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 80px;
    }

    .profile-photo {
      flex-shrink: 0;
      width: 360px;
      max-width: 100%;
      overflow: hidden;
    }

    .profile-photo img {
      width: 200%;
      height: auto;
      display: block;
      margin-left: -50%;
    }

    .profile-info {
      flex: 1;
      min-width: 0;
    }

    /* Tablet */
    @media (max-width: 768px) {
      header {
        padding: 14px 20px;
      }

      main {
        margin: 40px auto;
        padding: 0 20px;
      }

      .profile {
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }

      .profile-photo {
        width: 440px;
      }

      .profile-info {
        padding-top: 0;
        text-align: center;
      }
    }

    /* Phone */
    @media (max-width: 480px) {
      .site-name {
        font-size: 1.1rem;
      }

      nav a {
        padding: 6px 8px;
        font-size: 0.85rem;
      }

      .profile-photo {
        width: 500px;
      }

      .profile-info {
        text-align: left;
      }
    }

    .profile-info h1 {
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.85;
      color: #444;
      margin-bottom: 20px;
    }

    .profile-info p {
      font-size: 1.1rem;
      line-height: 1.85;
      color: #444;
      margin-bottom: 0;
    }

    .profile-info p a {
      color: #0070f3;
      text-decoration: none;
    }

    .profile-info p a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <a class="site-name" href="index.html">Wenni Yang</a>
    <nav>
      <a href="index.html" class="active">Home</a>
      <a href="research.html">Research</a>
      <a href="cv.html">CV</a>
    </nav>
  </header>

  <main>
    <h1 class="page-heading">Wenni Yang</h1>
    <div class="profile">

      <!-- LEFT: Photo -->
      <div class="profile-photo">
        <img src="profilephoto.jpg" alt="Wenni Yang" />
      </div>

      <!-- RIGHT: Bio and email -->
      <div class="profile-info">
        <h1>I am a 5th year PhD student in Economics at University of California, Davis. My research interests are labor economics, health economics, and economic history. </h1>
        <p>I can be reached at <a href="mailto:wniyang@ucdavis.edu">wniyang@ucdavis.edu</a>.</p>
      </div>

    </div>
  </main>

</body>
</html>
